name: Alti.Analytics GCP Enterprise CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Secure Workload Identity Federation (Zero-Trust Keyless Auth)
permissions:
  id-token: write 
  contents: read

env:
  PROJECT_ID: alti-analytics-prod
  REGION: us-central1
  GAR_LOCATION: us-central1-docker.pkg.dev
  REPOSITORY: alti-repo
  IMAGE_NAME: web-portal

jobs:
  lint-and-test:
    name: Run Linters & E2E Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web-portal/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: ./apps/web-portal
        run: npm ci

      - name: Run ESLint
        working-directory: ./apps/web-portal
        run: npm run lint

      - name: Run Playwright E2E Tests
        working-directory: ./apps/web-portal
        run: |
          npx playwright install --with-deps
          npx playwright test

  build-and-deploy:
    name: Build & Deploy to Google Cloud
    needs: lint-and-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Zero-Trust authentication to Google Cloud
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/123456789/locations/global/workloadIdentityPools/github/providers/github'
          service_account: 'alti-ci-cd@alti-analytics-prod.iam.gserviceaccount.com'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Docker Auth to Artifact Registry
        run: gcloud auth configure-docker ${{ env.GAR_LOCATION }}

      - name: Build and Push Docker Image
        working-directory: ./apps/web-portal
        run: |
          docker build -t ${{ env.GAR_LOCATION }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} .
          docker push ${{ env.GAR_LOCATION }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy alti-web-portal \
            --image ${{ env.GAR_LOCATION }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --quiet
