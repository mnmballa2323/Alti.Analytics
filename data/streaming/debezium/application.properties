# Debezium Server configuring for Google Cloud Pub/Sub
debezium.sink.type=pubsub
debezium.sink.pubsub.project.id=alti-analytics-prod
debezium.sink.pubsub.ordering.enabled=true
debezium.sink.pubsub.null.key=default

# Transform format from Kafka Connect/Debezium struct to JSON
debezium.format.value=json
debezium.format.key=json

# Source configuration (Cloud SQL PostgreSQL)
debezium.source.connector.class=io.debezium.connector.postgresql.PostgresConnector
debezium.source.offset.storage.file.filename=data/offsets.dat
debezium.source.offset.flush.interval.ms=0
debezium.source.database.hostname=10.0.1.5 # Placeholder internal IP of Cloud SQL
debezium.source.database.port=5432
debezium.source.database.user=admin
debezium.source.database.password=${DB_PASSWORD}
debezium.source.database.dbname=altianalytics
debezium.source.database.server.name=prod-pg-server
debezium.source.plugin.name=pgoutput
debezium.source.slot.name=debezium_cdc

# Table inclusion for CDC
debezium.source.table.include.list=public.users,public.billing,public.transactions
