# Post-Quantum Cryptography (PQC) - Istio Service Mesh
# Upgrades mTLS to mitigate "Harvest Now, Decrypt Later" quantum computing threats.

apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: "default-pqc-mtls"
  namespace: "istio-system"
spec:
  # Enforce STRICT mTLS across the entire mesh
  mtls:
    mode: STRICT

---
apiVersion: networking.istio.io/v1alpha3
kind: DestinationRule
metadata:
  name: "default-pqc-destination-rule"
  namespace: "istio-system"
spec:
  host: "*.local"
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
      
      # In modern Istio (backed by Envoy/BoringSSL), 
      # we can configure TLS to prioritize Post-Quantum Key Encapsulation Mechanisms (KEMs).
      # e.g., X25519Kyber768Draft00 or the finalized ML-KEM standard.
      # This forces the proxies to hybridize classical ECDHE with PQC algorithms.
      # 
      # While standard API exposed via older Istio versions might abstract this,
      # Envoy proxy configuration can specify the exact cipher suites.
      # For the scope of this blueprint, we explicitly define the hybrid curves.
      cryptoConfiguration:
        # Enforcing TLS 1.3
        minProtocolVersion: TLSV1_3
        # Directing Envoy to prioritize Kyber/ML-KEM hybrid curves
        ecdhCurves:
        - X25519Kyber768Draft00
        - X25519
