apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: llm-gateway-vs
  namespace: ml-serving
spec:
  hosts:
  - llm-gateway-service
  http:
  - route:
    - destination:
        host: llm-gateway-service
        subset: v1
      weight: 90
    - destination:
        host: llm-gateway-service
        subset: v2-experimental
      weight: 10
