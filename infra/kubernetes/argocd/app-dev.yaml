apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alti-analytics-dev
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: 'https://github.com/alticompany/Alti.Analytics.git'
    targetRevision: HEAD
    path: infra/kubernetes/apps/dev
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
